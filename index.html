  cycleChk.addEventListener("change", () => { cycleOn = cycleChk.checked; nextSwitch = 0; });
  function ttlMs() {
    const a = Math.min(+el("ttl-lo").value, +el("ttl-hi").value);
    const b = Math.max(+el("ttl-lo").value, +el("ttl-hi").value);
    return (a + Math.random() * (b - a)) * 1000;
  }
  function cyclePresets(now) {
    if (!cycleOn || presets.length < 2 || Math.max(+el("ttl-lo").value, +el("ttl-hi").value) <= 0) { nextSwitch = 0; return; }
    if (!nextSwitch) { nextSwitch = now + ttlMs(); return; }
    if (now >= nextSwitch) {
      let n; do { n = (Math.random() * presets.length) | 0; } while (n === curPreset && presets.length > 1);
      applyPreset(n);
      nextSwitch = now + ttlMs();
    }
  }
  el("ttl-lo").addEventListener("input", () => nextSwitch = 0);   // reschedule on retune
  el("ttl-hi").addEventListener("input", () => nextSwitch = 0);
  effectSel.addEventListener("change", () => { setEffect(+effectSel.value); nextSwitch = 0; });
  paletteSel.addEventListener("change", () => {
    // while morphing, a manual pick restarts the blend from that palette
    if (morphing) startMorph(+paletteSel.value);
    else setPalette(+paletteSel.value);
  });
  morphChk.addEventListener("change", () => {
    morphing = morphChk.checked;
    if (morphing) startMorph(+paletteSel.value);
  });
  // Persist any control change (slider drag, select, checkbox) — one delegated
  // listener over the whole panel covers them all. Editing a control also breaks
  // the link to the selected preset (marks it "custom").
  function onEdit(e) {
    if (persistReady && !applyingPreset && e.target.id !== "preset") { curPreset = -1; presetSel.value = "-1"; }
    persist();
  }
  panel.addEventListener("input", onEdit);
  panel.addEventListener("change", onEdit);

  // Reset: restore *only the current effect's* settings (sliders, beat chips,
  // palette, auto-morph, show-box and TTL) to their preset defaults. It doesn't
  // change the effect, other effects, or the shared controls (auto-cycle, panel).
  el("reset").addEventListener("click", () => {
    states[effect] = presetState(effect);
    beatStates[effect] = presetBeat(effect);
    extras[effect] = presetExtra(effect);
    loadState(effect);                // apply to the live sliders
    loadBeat(effect);                 // ...the live chips
    loadExtra(effect);                // ...and palette/morph/show-box/TTL
    persist();
  });

  // Copy the current effect's settings as ready-to-paste preset lines (so they
  // can be handed back to bake in as this effect's new defaults).
  function currentSettingsText() {
    saveState(effect); saveBeat(effect); saveExtra(effect);   // capture the live values
    const e = effect, st = states[e], ex = extras[e];
    const fv = v => Array.isArray(v) ? "[" + v.join(", ") + "]" : v;
    const sliders = Object.keys(st).map(id => id + ": " + fv(st[id])).join(", ");
    const beat = Object.keys(beatStates[e]).map(id => {
      const on = ["low", "mid", "high"].filter(b => beatStates[e][id][b]);
      return on.length ? id + ': ["' + on.join('", "') + '"]' : null;
    }).filter(Boolean).join(", ");
    return "burnTheWeb — " + effectSel.options[e].text + " (effect " + e + ") — paste to Claude to set as this effect's defaults\n\n" +
      "PRESETS[" + e + "]: { " + sliders + " }\n" +
      "BEAT_PRESETS[" + e + "]: { " + beat + " }\n" +
      'EXTRA_PRESETS[' + e + ']: { palette: "' + ex.palette + '", morph: ' + ex.morph + ', showBox: ' + ex.showBox + ", ttl: [" + ex.ttl.join(", ") + "] }";
  }
  el("copy").addEventListener("click", () => {
    const text = currentSettingsText(), btn = el("copy");
    const done = okState => { btn.textContent = okState ? "Copied!" : "Copy failed"; setTimeout(() => btn.textContent = "Export settings", 1300); };
    const fallback = () => {
      try {
        const ta = document.createElement("textarea");
        ta.value = text; ta.style.cssText = "position:fixed;opacity:0";
        document.body.appendChild(ta); ta.select();
        const okc = document.execCommand("copy"); document.body.removeChild(ta); done(okc);
      } catch (e) { done(false); }
    };
    if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(text).then(() => done(true), fallback);
    else fallback();
  });

  // Import a pasted "Export settings" string and apply it to its effect.
  el("import").addEventListener("click", () => {
    const text = prompt("Paste exported settings:");
    if (!text) return;
    try {
      const grab = key => { const m = text.match(new RegExp("\\b" + key + "\\[(\\d)\\]:\\s*(\\{[\\s\\S]*?\\})")); return m ? { e: +m[1], obj: (new Function("return (" + m[2] + ")"))() } : null; };
      const P = grab("PRESETS"); if (!P || !PRESETS[P.e]) throw new Error("no valid PRESETS line");
      const B = grab("BEAT_PRESETS"), X = grab("EXTRA_PRESETS"), e = P.e;
      states[e] = P.obj;
      const bd = B ? B.obj : {};
      const nb = {};
      for (const id in beatReact) { const bands = bd[id] || []; nb[id] = { low: bands.indexOf("low") >= 0, mid: bands.indexOf("mid") >= 0, high: bands.indexOf("high") >= 0 }; }
      beatStates[e] = nb;
      if (X) extras[e] = X.obj;
      applyingPreset = true;
      effectSel.value = e; curPreset = -1;
      setEffect(e, false);
      presetSel.value = "-1";
      applyingPreset = false;
      persist();
    } catch (err) { alert("Couldn't import settings: " + err.message); }
  });

  // ---- presets: named full-scene snapshots (effect + all its settings) ----
  function snapshotScene() {
    saveState(effect); saveBeat(effect); saveExtra(effect);
    return {
      effect,
      state: JSON.parse(JSON.stringify(states[effect])),
      beat: JSON.parse(JSON.stringify(beatStates[effect])),
      extra: JSON.parse(JSON.stringify(extras[effect])),
    };
  }
  function defaultPresets() {
    return [0, 1, 2].map(e => ({ name: effectSel.options[e].text, effect: e, state: presetState(e), beat: presetBeat(e), extra: presetExtra(e) }));
  }
  function rebuildPresetOptions() {
    presetSel.innerHTML = "";
    presetSel.appendChild(new Option("— custom —", "-1"));
    presets.forEach((p, i) => presetSel.appendChild(new Option(p.name, String(i))));
    presetSel.value = curPreset < 0 ? "-1" : String(curPreset);
  }
  function applyPreset(i) {
    const p = presets[i]; if (!p) return;
    applyingPreset = true;
    states[p.effect] = JSON.parse(JSON.stringify(p.state));
    beatStates[p.effect] = JSON.parse(JSON.stringify(p.beat));
    extras[p.effect] = JSON.parse(JSON.stringify(p.extra));
    effectSel.value = p.effect;
    setEffect(p.effect, false);       // loads the just-installed scene
    curPreset = i; presetSel.value = String(i);
    applyingPreset = false;
    persist();
  }
  el("savepreset").addEventListener("click", () => {
    const name = (prompt("Preset name:", "Preset " + (presets.length + 1)) || "").trim();
    if (!name) return;
    presets.push({ name, ...snapshotScene() });
    curPreset = presets.length - 1;
    rebuildPresetOptions();
    persist();
  });
  el("delpreset").addEventListener("click", () => {
    if (curPreset < 0 || curPreset >= presets.length) return;   // nothing real selected
    presets.splice(curPreset, 1);
    curPreset = -1;
    rebuildPresetOptions();
    persist();
  });
  presetSel.addEventListener("change", () => { const i = +presetSel.value; if (i >= 0) applyPreset(i); else curPreset = -1; });

  // Initial paint: setEffect → loadExtra applies the restored effect's palette,
  // morph, show-box and TTL; then arm persistence so setup doesn't overwrite it.
  setEffect(+effectSel.value, false);
  if (presets.length === 0) { presets = defaultPresets(); curPreset = effect; }   // first visit: one preset per effect
  rebuildPresetOptions();
  persistReady = true;

  function setPanel(hidden) {
    panel.classList.toggle("hidden", hidden);
    persist();                          // remember panel open/closed across reloads
  }
  toggle.addEventListener("click", () => setPanel(!panel.classList.contains("hidden")));
  canvas.addEventListener("click", () => { paused = !paused; });
  window.addEventListener("keydown", e => {
    if (e.key === "h" || e.key === "H") setPanel(!panel.classList.contains("hidden"));
    else if (e.key === "Escape") closeHelp();
  });

  // ---- help popup: effect-aware explanation of every control ----
  const HELP = {
    intro: "Most sliders are <b>ranged</b>: the two thumbs set a low and a high bound and the live value drifts erratically between them — pinch the thumbs together to hold a constant. With <b>React to music</b> on, each slider's L/M/H chips make it react to low/mid/high beats. Every setting is saved in your browser, separately per effect.",
    effects: {
      0: { name: "Sirpinfyer", text: "A 2D Sierpiński triangle drawn by the chaos game — repeatedly jump halfway toward a random one of three slowly drifting corners — stamped as fresh heat into a classic rising-fire buffer." },
      1: { name: "Tetrafyer", text: "A 3D Sierpiński tetrahedron that is a rigid body bouncing inside a box under real physics; its four tumbling corners seed the same fire, and each wall hit bursts a sphere of sparks." },
      2: { name: "AnimeJulia", text: "A live Julia set. The seed point c orbits the rim of the Mandelbrot cardioid; each pixel's escape time is coloured through the fire palette." },
    },
    // when: "all" | "fire" (0,1) | "julia" (2) | "tetra" (1)
    sliders: [
      { n: "Presets", w: "all", t: "A preset is a named full scene — the effect plus every setting. Pick one to load it; editing anything marks it “— custom —”. Save preset snapshots the current look; Delete removes the selected one. Export/Import (bottom) copy the current effect's settings as text you can share or paste back." },
      { n: "Effect", w: "all", t: "Which visual is running. Part of a preset; auto-cycle can switch it for you." },
      { n: "Show box", w: "tetra", t: "Tetrafyer only — show or hide the wireframe of the box the tetrahedron bounces inside." },
      { n: "Auto-cycle presets", w: "all", t: "When on, a random saved preset is applied every so often (see Preset TTL). Turn off to stay put. Needs at least two saved presets." },
      { n: "Preset TTL", w: "all", t: "How long auto-cycle holds each preset: a random time in this range (seconds) before applying a random other one." },
      { n: "Palette", w: "all", t: "The colour ramp heat is mapped through." },
      { n: "Auto-morph palettes", w: "all", t: "Continuously cross-fades to a random palette every 8 seconds." },
      { n: "React to music", w: "all", t: "Capture system/tab audio (e.g. Spotify) or the microphone, split into low/mid/high bands. Arm a slider with its L/M/H chips: while audio is on it stops drifting and instead sits at its low end, snapping to its high end on each beat in that band and dropping back within 0.2s. Chips glow on the beats that drive them." },
      { n: "Banding", w: "all", t: "Strength of a filter that posterises the palette into hard light/dark contour stripes." },
      { n: "Band size", w: "all", t: "How many palette colours make up each light (and each dark) stripe." },
      { n: "Darkness", w: "all", t: "How far the dark stripes are darkened (0% = none, 100% = black)." },
      { n: "Zoom", w: "all", t: "Scales the whole view in and out." },
      { n: "Points", w: "fire", t: "Chaos-game points stamped per frame — the density and brightness of the fractal seed feeding the fire." },
      { n: "Drift speed", w: "fire", t: "Sirpinfyer: how fast the triangle's three corners wander. Tetrafyer: the physics tempo (how fast the tetrahedron bounces)." },
      { n: "Flame rise", w: "fire", t: "How tall flames climb before fading — linear in height." },
      { n: "Cardioid RPM", w: "julia", t: "How fast the seed orbits the big cardioid loop, in revolutions per minute." },
      { n: "Inner : outer ratio", w: "julia", t: "A small circle rides on the seed; this is how many turns it makes per big-loop lap (a spirograph gear ratio). It reshapes the fractal's fine filigree." },
      { n: "Cardioid start", w: "julia", t: "A fixed offset added to the seed's position around the cardioid, in laps (0 and 1 are the same point, 0.5 is halfway round)." },
    ],
  };
  const helpEl = el("help");
  function renderHelp() {
    const e = HELP.effects[effect];
    const applies = { all: true, fire: effect !== 2, julia: effect === 2, tetra: effect === 1 };
    const rel = HELP.sliders.filter(s => applies[s.w]);
    let html = '<div class="help-box"><button class="help-close" type="button" aria-label="Close">×</button>';
    html += "<h2>burnTheWeb — " + e.name + "</h2><p>" + e.text + "</p>";
    html += '<p class="help-intro">' + HELP.intro + "</p><dl>";
    for (const s of rel) html += "<dt>" + s.n + "</dt><dd>" + s.t + "</dd>";
    html += "</dl></div>";
    helpEl.innerHTML = html;
  }
  function openHelp() { renderHelp(); helpEl.classList.remove("hidden"); }
  function closeHelp() { helpEl.classList.add("hidden"); }
  el("help-btn").addEventListener("click", openHelp);
  helpEl.addEventListener("click", e => { if (e.target === helpEl || e.target.classList.contains("help-close")) closeHelp(); });

  // ---- auto-reload on new deploy ----
  // Ask the host what version is live by fetching our own document fresh (cache
  // busted) and deriving a version fingerprint from its actual bytes — content
  // length plus an FNV-1a hash — rather than trusting server headers. The first
  // probe records the running version; whenever a later probe differs, a new
  // build is deployed and we reload once to pick it up. Failures are ignored.
  (function autoReload() {
    function version(text) {
      let h = 0x811c9dc5;                          // FNV-1a 32-bit
      for (let i = 0; i < text.length; i++) {
        h ^= text.charCodeAt(i);
        h = (h * 0x01000193) >>> 0;
      }
      return text.length + ":" + h.toString(16);   // length guards against collisions
    }
    let running = null;
    async function check() {
      try {
        const res = await fetch(location.pathname + "?v=" + Date.now(), { cache: "no-store" });
        if (!res.ok) return;
        const deployed = version(await res.text());
        if (running === null) running = deployed;   // baseline = what we're running
        else if (deployed !== running) location.reload();
      } catch (e) { /* offline / transient — try again next tick */ }
    }
    check();                               // capture the running version now
    setInterval(check, 60000);             // then ask the host every 60s
  })();
})();
</script>
</body>
</html>
